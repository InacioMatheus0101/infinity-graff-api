# =============================================
# INFINITY GRAFF API — Configuração Principal
# Fase 1: Fundação Segura e Escalável
# =============================================
# ATENÇÃO:
# Nenhum segredo deve ser definido diretamente aqui.
# Use variáveis de ambiente ou arquivo .env local.
# =============================================

spring:
  application:
    name: infinity-graff-api

  # ===== Banco de Dados =====
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: InfinityGraffPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME:1800000}

  # ===== JPA / Hibernate =====
  jpa:
    hibernate:
      # Flyway gerencia o schema — Hibernate apenas valida
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        format_sql: true

  # ===== Flyway — Migrations =====
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: public
    validate-on-migrate: true
    encoding: UTF-8

  # ===== Serialização JSON =====
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

# ===== Swagger / OpenAPI =====
# Em production, SWAGGER_ENABLED deve ser false.
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    # Remove a URL padrão de exemplo do Swagger UI.
    # Não desabilita o botão "Try it out".
    disable-swagger-default-url: true

# ===== Supabase Auth =====
# O Supabase Auth é responsável por cadastro, login, sessão e refresh token.
# O backend valida o access token recebido no header Authorization.
supabase:
  auth:
    project-url: ${SUPABASE_PROJECT_URL}
    issuer: ${SUPABASE_ISSUER}
    audience: ${SUPABASE_AUDIENCE:authenticated}
    jwks-url: ${SUPABASE_JWKS_URL}

# ===== CORS =====
cors:
  # Desenvolvimento:
  # http://localhost:3000 → React CRA
  # http://localhost:5173 → Vite
  # http://localhost:8080 → backend/local ou testes
  #
  # Produção:
  # Nunca usar "*", localhost ou origem vazia.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}

# ===== Configurações da Aplicação =====
app:
  version: ${APP_VERSION:1.0.0}
  env: ${APP_ENV:development}
  admin:
    # Usado apenas pelo AdminSeeder quando SPRING_PROFILES_ACTIVE=development.
    #
    # IMPORTANTE:
    # O backend NÃO cria login, senha ou usuário no Supabase Auth.
    # O usuário admin precisa existir primeiro no Supabase Auth.
    # Aqui informamos apenas o UUID, e-mail e nome para criar o perfil interno ADMIN
    # na tabela usuarios, caso ainda não exista nenhum ADMIN.
    
    user-id: ${ADMIN_INITIAL_USER_ID:}
    email: ${ADMIN_INITIAL_EMAIL:}
    name: ${ADMIN_INITIAL_NAME:Administrador}

# ===== Logging =====
logging:
  level:
    com.infinitygraff: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO