# =============================================
# INFINITY GRAFF API — Configuração Principal
# Fase 1: Fundação Segura e Escalável
# =============================================
# ATENÇÃO:
# Nenhum segredo deve ser definido diretamente aqui.
# Use variáveis de ambiente ou arquivo .env local.
# =============================================

spring:
  application:
    name: infinity-graff-api

  # ===== Banco de Dados =====
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: InfinityGraffPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME:1800000}

  # ===== JPA / Hibernate =====
  jpa:
    hibernate:
      # Flyway gerencia o schema — Hibernate apenas valida
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        format_sql: true

  # ===== Flyway — Migrations =====
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: public
    validate-on-migrate: true
    encoding: UTF-8

  # ===== Serialização JSON =====
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

# ===== Swagger / OpenAPI =====
# Em production, SWAGGER_ENABLED deve ser false.
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    # Remove a URL padrão de exemplo do Swagger UI.
    # Não desabilita o botão "Try it out".
    disable-swagger-default-url: true

# ===== JWT =====
jwt:
  # Secret mínimo de 256 bits — obrigatório via variável de ambiente
  secret: ${JWT_SECRET}
  access-expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:15}
  refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}

# ===== CORS =====
cors:
  # Desenvolvimento:
  # http://localhost:3000 → React CRA
  # http://localhost:5173 → Vite
  # http://localhost:8080 → backend/local ou testes
  #
  # Produção:
  # Nunca usar "*", localhost ou origem vazia.
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}

# ===== Configurações da Aplicação =====
app:
  version: ${APP_VERSION:1.0.0}
  env: ${APP_ENV:development}
  admin:
    # Usado apenas pelo AdminSeeder quando SPRING_PROFILES_ACTIVE=development.
    # Sem fallback: a ausência da variável causa falha explícita na inicialização.
    # O AdminSeeder também valida que a senha não é vazia antes de criar o admin.
    email: ${ADMIN_INITIAL_EMAIL:admin@infinitygraff.com}
    password: ${ADMIN_INITIAL_PASSWORD}

# ===== Logging =====
logging:
  level:
    com.infinitygraff: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
  pattern:
    # ,UTC no padrão de data força o timestamp em UTC explicitamente,
    # independente do timezone da JVM — mais robusto que depender só do TZ=UTC.
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS,UTC} [%thread] %-5level %logger{36} - %msg%n"